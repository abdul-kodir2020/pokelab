<section class="pokedex-page">
    <header class="">
        <div class="account-btn">
            @if (isLoggedIn()) {
                <button type="button" class="header-btn" (click)="logout()">Se Déconnecter</button>
            }
        </div>
        <app-logo></app-logo>
    </header>
    <div class="sticky-bar">
        <div class="search">
            <input placeholder="Dracaufeu..." class="input-search" value="">
            <div class="icons-search">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="css-5d1ynz" style="border-radius: 50px; cursor: pointer; background-color: rgb(255, 255, 255);">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M15 10.5A3.502 3.502 0 0 0 18.355 8H21a1 1 0 1 0 0-2h-2.645a3.502 3.502 0 0 0-6.71 0H3a1 1 0 0 0 0 2h8.645A3.502 3.502 0 0 0 15 10.5zM3 16a1 1 0 1 0 0 2h2.145a3.502 3.502 0 0 0 6.71 0H21a1 1 0 1 0 0-2h-9.145a3.502 3.502 0 0 0-6.71 0H3z" fill="#000"></path>
                </svg>
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="css-5d1ynz" style="border-radius: 50px; cursor: pointer; background-color: rgb(200, 21, 22);">
                    <path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#fff" stroke-width="2.5"></path>
                </svg>
            </div>
        </div>
    </div>
    <!-- <div class="container p-4 mx-auto">
        
    </div> -->
    <div class="pokedex-container-list">
        <app-pokedex-list [pokemons$]="pokemons$" [types]="types"></app-pokedex-list>
    </div>
    <a routerLink="/pokedex/creer" class="fab-create-pokemon">
        +
    </a>
</section>
