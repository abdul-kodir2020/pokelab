<section class="container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">Mes créatures</h2>

    <ng-container *ngIf="pokemons$ | async as pokemons; else loading">
        <ng-container *ngIf="pokemons.length; else empty">
            <ul class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <li *ngFor="let p of pokemons; trackBy: trackById"
                    class="rounded-xl shadow p-4 bg-white flex items-center gap-4">
                    <img [src]="p.imageUrl" [alt]="p.name"
                        class="w-20 h-20 object-contain rounded-lg bg-gray-50 shrink-0"
                    />

                    <div class="flex-1">
                        <div class="flex items-center justify-between gap-2">
                            <h3 class="text-lg font-semibold truncate">{{ p.name }}</h3>
                            <span
                                class="text-xs px-2 py-1 rounded-full bg-orange-100 text-orange-700 whitespace-nowrap">
                                {{ p.type1 }}
                            </span>
                        </div>

                        <p class="text-sm text-gray-500 mt-1">
                            PV: {{ p.hp }} • ATK: {{ p.attack }} • Nv. {{ p.level }}
                        </p>

                        <!-- Bouton (exemple) -->
                        <!-- <a [routerLink]="['/creature', p.id]" class="text-blue-600 text-sm underline mt-2 inline-block">Voir</a> -->
                    </div>
                </li>

            </ul>
        </ng-container>
    </ng-container>

    <ng-template #loading>
        <p>Chargement…</p>
    </ng-template>

    <ng-template #empty>
        <p>Aucune créature pour le moment.</p>
    </ng-template>
</section>
