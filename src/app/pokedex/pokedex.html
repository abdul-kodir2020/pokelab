<section class="container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">Mes créatures</h2>
    <div class="mb-4 flex justify-end">
        <a routerLink="/pokedex/creer"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-green-700 text-white hover:opacity-90 cursor-pointer">
            + Ajouter un Pokémon
        </a>
    </div>

    <ng-container *ngIf="pokemons$ | async as pokemons; else loading">
        <ng-container *ngIf="pokemons.length; else empty">
            <ul class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <li *ngFor="let p of pokemons; trackBy: trackById" class="rounded-xl shadow bg-white">
                    <a [routerLink]="['/creatures', p.id, 'edit']" class="flex items-center gap-4 p-4 block">
                        <img [src]="p.imageUrl" [alt]="p.name" class="w-20 h-20 object-contain rounded-lg bg-gray-50" />
                        <div class="flex-1">
                            <div class="flex items-center justify-between gap-2">
                                <h3 class="text-lg font-semibold truncate">{{ p.name }}</h3>
                                <span
                                    class="text-xs px-2 py-1 rounded-full bg-orange-100 text-orange-700 whitespace-nowrap">
                                    {{ p.type1 }}
                                </span>
                            </div>
                            <p class="text-sm text-gray-500 mt-1">PV: {{ p.hp }} • ATK: {{ p.attack }} • Nv. {{ p.level
                                }}</p>
                        </div>
                    </a>

                    <div class="flex items-center justify-end gap-2 px-4 pb-4">
                        <a [routerLink]="['/creatures', p.id, 'edit']"
                            class="px-3 py-1.5 rounded bg-blue-600 text-white cursor-pointer hover:opacity-90">
                            Modifier
                        </a>
                        <button type="button"
                            class="px-3 py-1.5 rounded bg-red-600 text-white cursor-pointer hover:opacity-90"
                            (click)="onDelete(p, $event)">
                            Supprimer
                        </button>
                    </div>
                </li>
            </ul>

        </ng-container>
    </ng-container>

    <ng-template #loading>
        <p>Chargement…</p>
    </ng-template>
    <ng-template #empty>
        <p>Aucune créature pour le moment.</p>
    </ng-template>
</section>
