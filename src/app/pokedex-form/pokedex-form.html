<section class="container mx-auto max-w-2xl p-6">
  <h1 class="text-2xl font-bold mb-4">{{ title }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
    <div>
      <label class="block text-sm font-medium mb-1">Nom</label>
      <input type="text" formControlName="name" class="w-full rounded border p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Type</label>
      <select formControlName="type1" class="w-full rounded border p-2">
        <option value="">— Choisir —</option>
        <option *ngFor="let t of types" [value]="t.name">{{ t.name }}</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">PV (HP)</label>
        <input type="number" formControlName="hp" class="w-full rounded border p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Attaque</label>
        <input type="number" formControlName="attack" class="w-full rounded border p-2" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Niveau</label>
      <input type="number" formControlName="level" class="w-full rounded border p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Image (URL)</label>
      <input type="url" formControlName="imageUrl" class="w-full rounded border p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Image shiny (URL)</label>
      <input type="url" formControlName="shinyImageUrl" class="w-full rounded border p-2" />
    </div>

    <div class="flex items-center gap-3">
      <img *ngIf="form.value.imageUrl" [src]="form.value.imageUrl" class="w-16 h-16 object-contain bg-gray-50 rounded" />
      <span class="text-gray-500 text-sm">Aperçu</span>
    </div>

    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded bg-blue-600 text-white cursor-pointer disabled:opacity-50"
              [disabled]="form.invalid">
        {{ submitLabel }}
      </button>
      <a routerLink="/pokedex" class="px-4 py-2 rounded border cursor-pointer">Annuler</a>
    </div>
  </form>
</section>
